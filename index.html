<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chilla by Beaverly</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chilla">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="logo">Chilla</div>
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- Auth Container -->
        <div id="auth-container" class="screen hidden">
            <div class="auth-screen">
                <div class="auth-header">
                    <h1 class="logo-text">Chilla</h1>
                    <p class="subtitle">by Beaverly</p>
                </div>

                <!-- Tab Navigation -->
                <div class="flex bg-gray-100 rounded-lg p-1 mb-6" style="display: flex; background: #f3f4f6; border-radius: 8px; padding: 4px; margin-bottom: 24px;">
                    <button id="login-tab" class="flex-1 py-2 px-4 text-sm font-medium rounded-md bg-white text-gray-900 shadow-sm" style="flex: 1; padding: 8px 16px; font-size: 14px; font-weight: 500; border-radius: 6px; background: white; color: #111827; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); border: none; cursor: pointer;">Sign In</button>
                    <button id="register-tab" class="flex-1 py-2 px-4 text-sm font-medium rounded-md text-gray-600 hover:text-gray-900" style="flex: 1; padding: 8px 16px; font-size: 14px; font-weight: 500; border-radius: 6px; color: #6b7280; border: none; cursor: pointer; background: transparent;">Sign Up</button>
                </div>

                <!-- Auth Form -->
                <form id="auth-form" class="auth-form">
                    <input type="email" id="email" placeholder="Email" class="input-field" required>
                    <input type="password" id="password" placeholder="Password" class="input-field" required>

                    <button type="submit" id="auth-btn" class="primary-btn">
                        <span id="auth-text">Sign In</span>
                        <div id="auth-spinner" class="loading-spinner hidden" style="width: 20px; height: 20px; margin-left: 8px;"></div>
                    </button>

                    <button type="button" id="gmail-login-btn" class="secondary-btn">Continue with Google</button>

                    <div class="auth-links">
                        <a href="#" id="forgot-password-link">Forgot password?</a>
                    </div>
                </form>

                <!-- Error Message -->
                <div id="error-message" class="hidden" style="margin-top: 16px; padding: 12px; background: #fee2e2; border: 1px solid #fecaca; border-radius: 6px; color: #dc2626;">
                    <span id="error-text"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>

    <!-- Chatbot -->
    <script src="https://cdn.botpress.cloud/webchat/v3.0/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/06/09/22/20250609220506-ZFL7FQ6G.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-229WRH1KTN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-229WRH1KTN');
    </script>

    <script>
        // Hide loading screen and show auth container after a short delay
        setTimeout(() => {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('auth-container').classList.remove('hidden');
        }, 1000);
    </script>
</body>
</html>
