
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chilla by Beaverly</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chilla">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="logo">Chilla</div>
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- Auth Flow -->
        <div id="auth-container" class="screen hidden">
            <div class="auth-header">
                <h1 class="logo-text">Chilla</h1>
                <p class="subtitle">by Beaverly</p>
            </div>
            
            <div class="tab-container">
                <div class="tab-buttons">
                    <button id="login-tab" class="tab-button active">Sign In</button>
                    <button id="register-tab" class="tab-button">Sign Up</button>
                </div>
            </div>

            <form id="auth-form" class="auth-form">
                <div id="error-message" class="error-message hidden">
                    <span id="error-text"></span>
                </div>
                
                <input type="email" id="email" placeholder="Email" class="input-field" required>
                <input type="password" id="password" placeholder="Password" class="input-field" required>
                
                <button type="submit" id="auth-btn" class="primary-btn">
                    <span id="auth-text">Sign In</span>
                    <div id="auth-spinner" class="loading-spinner hidden"></div>
                </button>
                
                <button type="button" id="gmail-login-btn" class="secondary-btn">
                    Continue with Google
                </button>
                
                <div class="auth-links">
                    <a href="#" id="forgot-password-link">Forgot password?</a>
                </div>
            </form>
        </div>
            
    </div>

    <script src="js/auth.js"></script>
    
    <!-- Chatbot -->
    <script src="https://cdn.botpress.cloud/webchat/v3.0/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/06/09/22/20250609220506-ZFL7FQ6G.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-229WRH1KTN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-229WRH1KTN');
    </script>
</body>
</html>
