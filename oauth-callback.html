<new_str><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <div class="loading-screen">
        <div class="loading-content">
            <div class="logo">Chilla</div>
            <div class="loading-spinner"></div>
            <p>Completing authentication...</p>
        </div>
    </div>

    <script>
        // Handle OAuth callback
        async function handleOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            if (error) {
                alert('Authentication failed: ' + error);
                window.location.href = 'index.html';
                return;
            }

            if (!code) {
                alert('No authorization code received');
                window.location.href = 'index.html';
                return;
            }

            try {
                // Send the authorization code to your backend
                const response = await fetch('https://cook.beaverlyai.com/auth/callback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ code, state })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'success') {
                        // Store user email and info for later use
                        if (data.email) {
                            localStorage.setItem('chilla_user_email', data.email);
                        }
                        if (data.user_data) {
                            // Store additional user info if provided
                            localStorage.setItem('chilla_user_data', JSON.stringify(data.user_data));
                        }
                        // Authentication successful, redirect to dashboard
                        window.location.href = 'dashboard.html';
                    } else {
                        throw new Error(data.message || 'Authentication failed');
                    }
                } else {
                    const data = await response.json();
                    alert('Authentication failed: ' + (data.detail || data.message || 'Unknown error'));
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('OAuth callback error:', error);
                alert('Network error during authentication');
                window.location.href = 'index.html';
            }
        }

        // Execute callback handling when page loads
        handleOAuthCallback();
    </script>
</body>
</html></new_str>
